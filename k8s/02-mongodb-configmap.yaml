apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: todo-app
data:
  mongodb.conf: |
    # mongod.conf
    storage:
      dbPath: /data/db
    systemLog:
      destination: file
      path: /dev/stdout
      logAppend: true
    net:
      bindIp: 0.0.0.0
      port: 27017
  init.sh: |
    #!/bin/bash
    # Create application user with least privilege
    mongosh <<EOF
    db = db.getSiblingDB("${MONGO_APP_DATABASE}");
    db.createUser({
      user: "${MONGO_APP_USERNAME}",
      pwd: "${MONGO_APP_PASSWORD}",
      roles: [
        { role: "readWrite", db: "${MONGO_APP_DATABASE}" }
      ]
    });
    EOF
